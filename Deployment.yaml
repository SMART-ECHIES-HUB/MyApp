apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      containers:
      - name: weather-api
        image: your-dockerhub-username/weather-api:latest
        ports:
        - containerPort: 5100
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5100"
